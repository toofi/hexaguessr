<section class="game">
  <header class="top">
    <span class="round">{{ game.currentRoundNumber() }} / {{ totalRounds }}</span>
    <div class="progress" [style.--p]="progress()"></div>
    <span class="score">{{ game.totalScore() }} pts</span>
  </header>

  <div class="timer">
    <span class="seconds">{{ seconds() }}</span>
    <span class="hundredths">.{{ hundredths() }}</span>
  </div>
  <p class="timer-label">SECONDS</p>

  <p class="prompt">FIND THIS COLOUR</p>
  <p class="hex">{{ targetHex() }}</p>

  <div class="picker">
    <canvas
      #canvas
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp($event)"
      (pointercancel)="onPointerUp($event)"
    ></canvas>
    @if (cursorVisible()) {
      <div
        class="cursor"
        [style.left.px]="cursorX()"
        [style.top.px]="cursorY()"
      ></div>
    }
  </div>
</section>
