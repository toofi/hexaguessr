<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="20%" stop-color="#ffd755"/>
      <stop offset="40%" stop-color="#4ade80"/>
      <stop offset="60%" stop-color="#55d7ff"/>
      <stop offset="80%" stop-color="#5555ff"/>
      <stop offset="100%" stop-color="#d755ff"/>
    </linearGradient>
  </defs>
  <!-- Square dark background with rounded corners (so it looks nice as maskable too) -->
  <rect width="512" height="512" rx="96" fill="#0d0d14"/>
  <!-- Outer ring gradient -->
  <circle cx="256" cy="232" r="120" fill="none" stroke="url(#ring)" stroke-width="28"/>
  <!-- Brand text -->
  <text x="256" y="420"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700"
        font-size="64"
        fill="#4ade80"
        letter-spacing="6">HEX</text>
</svg>
